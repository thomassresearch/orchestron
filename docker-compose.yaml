services:
  orchestron:
    build:
      context: .
      dockerfile: Dockerfile
    image: visualcsound-browser-clock:local
    # Use explicit port publishing so the API is reachable on macOS Docker Desktop.
    # (Host networking is not a good default on macOS.)
    ports:
      - "8000:8000"
    command:
      - .venv/bin/python
      - -m
      - backend.app.main
      - --audio-output-mode
      - browser_clock
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --no-reload
      - --log-level
      - info
    environment:
      VISUALCSOUND_AUDIO_OUTPUT_MODE: browser_clock
      # On macOS (Docker Desktop), ALSA device passthrough is not available.
      # Use a non-ALSA backend by default so `docker compose up` works.
      # In browser-clock mode the browser owns the PCM queue and CSound still receives live MIDI
      # via host-implemented callbacks inside the container. Prefer the "null" RTMIDI backend so
      # container MIDI devices are not required.
      VISUALCSOUND_DEFAULT_RTMIDI_MODULE: null
      VISUALCSOUND_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8000","http://127.0.0.1:8000"]'
    volumes:
      - orchestron_data:/app/backend/data
    # Linux ALSA passthrough is provided via docker-compose.alsa.yaml for native local mode.
    # Do not enable on macOS; /dev/snd does not exist there.
    restart: unless-stopped

volumes:
  orchestron_data:
    external: true
